<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive EduAI Science Learning App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🧠 EduAI</h1>

<p class="subtitle">
Interactive AI Science Learning Platform
</p>

<div class="subjects">

<button onclick="showBiology()">
Biology
</button>

<button onclick="showPhysics()">
Physics
</button>

<button onclick="showChemistry()">
Chemistry
</button>

</div>

<div id="subject-content">

<h2>Welcome Student 👋</h2>

<p>
Choose a subject to start learning.
</p>

</div>

<div class="chat-section">

<textarea id="question"
placeholder="Ask your science question...">
</textarea>

<button class="ask-btn"
onclick="askAI()">
Ask AI
</button>

<div id="result">
AI answers will appear here.
</div>

</div>

<div class="quiz-box">

<h2>Quick Quiz</h2>

<p>
What is the powerhouse of the cell?
</p>

<button onclick="checkAnswer('wrong')">
Nucleus
</button>

<button onclick="checkAnswer('correct')">
Mitochondria
</button>

<button onclick="checkAnswer('wrong')">
Brain
</button>

<div id="quiz-result"></div>

</div>

<p class="note">
This AI learning tool is for educational purposes only.
</p>

</div>

<script src="script.js"></script>

</body>
</html>
